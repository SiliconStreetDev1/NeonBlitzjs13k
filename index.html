<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0c10">
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <title>Neon Blitz</title>
</head>
<body>
  
  <div id="startOverlay" style="position:fixed;inset:0;background:rgba(11,12,16,0.95);color:#66fcf1;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-size:2rem;font-weight:bold;cursor:pointer;font-family:monospace;letter-spacing:2px;">
    [ TAP TO START ]
  </div>

  <div class="hud">
    <div class="stats-row">
      <div class="stats">LVL: <span id="levelDisplay">1</span> | TIME: <span id="timeSpentDisplay">0.0s</span></div>
    </div>
    <div id="targetColorName" style="font-size: 1.4rem; margin: 4px 0;"></div>
    <div class="timer-container"><div id="timerBar" class="timer-bar"></div></div>
  </div>
  
  <div class="game-area">
    <div id="gridContainer" class="grid"></div>
    <canvas id="lineCanvas"></canvas>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
